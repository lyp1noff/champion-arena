services:
  db:
    image: postgres:17.6
    container_name: champion-tatami-postgres-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: "${POSTGRES_DB:-champ_local}"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: ghcr.io/lyp1noff/champion-tatami-backend:${IMAGE_TAG:-latest}
    container_name: champion-tatami-backend
    pull_policy: always
    restart: always
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-champ_local}
      - EXTERNAL_API_URL=${EXTERNAL_API_URL}
      - EXTERNAL_API_TOKEN=${EXTERNAL_API_TOKEN}
      - EDGE_ID=${EDGE_ID:-tatami-node-01}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DEV_MODE=${DEV_MODE}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: ghcr.io/lyp1noff/champion-tatami-frontend:${IMAGE_TAG:-latest}
    container_name: champion-tatami-frontend
    pull_policy: always
    restart: always
    depends_on:
      - backend
  
  outbox:
    image: ghcr.io/lyp1noff/champion-tatami-outbox:${IMAGE_TAG:-latest}
    container_name: champion-tatami-outbox
    pull_policy: always
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-champ_local}
      - EXTERNAL_API_URL=${EXTERNAL_API_URL}
      - EXTERNAL_API_TOKEN=${EXTERNAL_API_TOKEN}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - PROCESSING_INTERVAL=${PROCESSING_INTERVAL:-1s}
      - HTTP_TIMEOUT=${HTTP_TIMEOUT:-10s}
      - BATCH_SIZE=${BATCH_SIZE:-10}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: champion-tatami-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  pg_data:
