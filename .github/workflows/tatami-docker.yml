name: tatami-build-and-push

on:
  push:
    branches: [ "main", "dev" ]
    tags: [ "v*.*.*" ]
    paths:
      - "tatami/**"
      - "domain/**"
      - ".github/workflows/tatami-docker.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: tatami-docker-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NS: ${{ github.repository_owner }}/champion-tatami

jobs:
  build-backend:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'prod' || 'stage' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: docker/setup-buildx-action@v3
      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Meta backend
        id: meta_backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NS }}-backend
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ github.ref_name == 'main' && 'prod' || 'stage' }}

      - name: Build+Push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./tatami/backend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta_backend.outputs.tags }}
          labels: ${{ steps.meta_backend.outputs.labels }}
          provenance: false
          sbom: false

  build-frontend:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'prod' || 'stage' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: docker/setup-buildx-action@v3
      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Meta frontend
        id: meta_frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NS }}-frontend
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ github.ref_name == 'main' && 'prod' || 'stage' }}

      - name: Build+Push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./tatami/frontend
          file: ./tatami/frontend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta_frontend.outputs.tags }}
          labels: ${{ steps.meta_frontend.outputs.labels }}
          provenance: false
          sbom: false

  build-outbox:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'prod' || 'stage' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: docker/setup-buildx-action@v3
      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Meta outbox
        id: meta_outbox
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NS }}-outbox
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ github.ref_name == 'main' && 'prod' || 'stage' }}

      - name: Build+Push outbox
        uses: docker/build-push-action@v6
        with:
          context: ./tatami/outbox
          file: ./tatami/outbox/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta_outbox.outputs.tags }}
          labels: ${{ steps.meta_outbox.outputs.labels }}
          provenance: false
          sbom: false
